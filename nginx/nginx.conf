events {
    worker_connections 1024;
}

http {
    # ── Upstream Servers ─────────────────────────
    upstream backend {
        server omcs-backend:4000;
    }

    upstream frontend {
        server omcs-frontend:3000;
    }

    upstream storefront {
        server omcs-storefront:3000;
    }

    # ── Shared Settings ──────────────────────────
    client_max_body_size 10M;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # WebSocket support
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    # ─────────────────────────────────────────────
    # API Backend → api.omcs.com.ly
    # ─────────────────────────────────────────────
    server {
        listen 80;
        server_name api.omcs.com.ly;

        location / {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
    }

    # ─────────────────────────────────────────────
    # Admin Frontend → admin.omcs.com.ly
    # ─────────────────────────────────────────────
    server {
        listen 80;
        server_name admin.omcs.com.ly;

        location /api/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        location /uploads/ {
            proxy_pass http://backend;
        }

        location /socket.io/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
    }

    # ─────────────────────────────────────────────
    # Storefront → shop.omcs.com.ly
    # ─────────────────────────────────────────────
    server {
        listen 80;
        server_name shop.omcs.com.ly;

        location /api/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
        }

        location /uploads/ {
            proxy_pass http://backend;
        }

        location /socket.io/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        location / {
            proxy_pass http://storefront;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
    }

    # ─────────────────────────────────────────────
    # Fallback / IP-based access
    # ─────────────────────────────────────────────
    server {
        listen 80 default_server;
        server_name _;

        location /api/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        location /uploads/ {
            proxy_pass http://backend;
        }

        location /socket.io/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
    }
}
