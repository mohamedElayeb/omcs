events {
    worker_connections 1024;
}

http {
    # ── Upstream Servers ─────────────────────────
    upstream backend {
        server omcs-backend:4000;
    }

    upstream frontend {
        server omcs-frontend:3000;
    }

    upstream storefront {
        server omcs-storefront:3000;
    }

    # ── Shared Settings ──────────────────────────
    client_max_body_size 10M;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # WebSocket support
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    # ─────────────────────────────────────────────
    # HTTP → HTTPS redirect (all domains)
    # ─────────────────────────────────────────────
    server {
        listen 80;
        server_name api.omcs.com.ly admin.omcs.com.ly shop.omcs.com.ly;

        # Let's Encrypt challenge path
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect everything else to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ─────────────────────────────────────────────
    # API Backend (HTTPS) → api.omcs.com.ly
    # ─────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name api.omcs.com.ly;

        ssl_certificate /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location / {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
    }

    # ─────────────────────────────────────────────
    # Admin Frontend (HTTPS) → admin.omcs.com.ly
    # ─────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name admin.omcs.com.ly;

        ssl_certificate /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location /api/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        location /uploads/ {
            proxy_pass http://backend;
        }

        location /socket.io/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
    }

    # ─────────────────────────────────────────────
    # Storefront (HTTPS) → shop.omcs.com.ly
    # ─────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name shop.omcs.com.ly;

        ssl_certificate /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location /api/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
        }

        location /uploads/ {
            proxy_pass http://backend;
        }

        location /socket.io/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        location / {
            proxy_pass http://storefront;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
    }

    # ─────────────────────────────────────────────
    # Fallback / IP-based access (HTTP only)
    # ─────────────────────────────────────────────
    server {
        listen 80 default_server;
        server_name _;

        location /api/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        location /uploads/ {
            proxy_pass http://backend;
        }

        location /socket.io/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
    }
}
